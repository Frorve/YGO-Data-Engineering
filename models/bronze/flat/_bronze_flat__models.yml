version: 2

models:
  - name: bronze_flat_cards
    description: >
      Modelo FLAT principal con los campos escalares de cada carta aplanados desde el JSON RAW.
      Cada fila representa una ingesta de la API para una carta concreta.
      Los precios y views se simulan mediante Brownian Motion cuando enable_brownian_mock es true.
      Se conservan siempre los valores originales de la API en columnas con prefijo api_.
    config:
      tags: ['bronze', 'flat']
    columns:
      - name: ingesta_id
        description: "Identificador único de la ingesta que generó este registro."
        tests:
          - not_null

      - name: entorno
        description: "Entorno en el que se generó el registro: dev, pre o pro."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['dev', 'pre', 'pro']

      - name: ingesta_ts
        description: "Timestamp UTC del momento de la ingesta."
        tests:
          - not_null

      - name: es_mock
        description: "Indica si el payload RAW de origen es simulado."
        tests:
          - not_null

      - name: is_mocked
        description: "TRUE si los precios y views han sido simulados con Brownian Motion."
        tests:
          - not_null

      - name: card_id
        description: "Passcode de la carta, identificador único en la API de YGOPRODeck."
        tests:
          - not_null

      - name: card_name
        description: "Nombre oficial de la carta en inglés."
        tests:
          - not_null

      - name: card_type
        description: "Tipo de carta: Normal Monster, Effect Monster, Spell Card, Trap Card, etc."
        tests:
          - not_null

      - name: frame_type
        description: "Tipo de marco visual de la carta: normal, effect, spell, trap, fusion, synchro, xyz, link, etc."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['normal', 'effect', 'ritual', 'fusion', 'synchro', 'xyz', 'link',
                         'normal_pendulum', 'effect_pendulum', 'ritual_pendulum',
                         'fusion_pendulum', 'synchro_pendulum', 'xyz_pendulum',
                         'spell', 'trap', 'token', 'skill']

      - name: card_desc
        description: "Texto del efecto o descripción de la carta."

      - name: race
        description: "Raza del monstruo o subtipo de Spell/Trap."

      - name: attribute
        description: "Atributo del monstruo: DARK, EARTH, FIRE, LIGHT, WATER, WIND, DIVINE. Null para Spell y Trap."
        tests:
          - accepted_values:
              arguments:
                values: ['DARK', 'EARTH', 'FIRE', 'LIGHT', 'WATER', 'WIND', 'DIVINE']
              config:
                where: "attribute IS NOT NULL"

      - name: atk
        description: "Puntos de ataque del monstruo. Null para Spell y Trap."

      - name: def
        description: "Puntos de defensa del monstruo. Null para Link Monsters, Spell y Trap."

      - name: level
        description: "Nivel o Rango del monstruo. Null para Link Monsters, Spell y Trap."

      - name: archetype
        description: "Arquetipo al que pertenece la carta."

      - name: link_val
        description: "Valor de Link. Solo presente en Link Monsters."

      - name: pendulum_scale
        description: "Valor de Escala Pendulum. Solo presente en cartas Pendulum."

      - name: ygoprodeck_url
        description: "URL de la carta en el sitio web de YGOPRODeck."

      - name: api_cardmarket_price
        description: "Precio original de Cardmarket en euros tal como lo devuelve la API. Nunca modificado."

      - name: api_tcgplayer_price
        description: "Precio original de TCGPlayer en dólares tal como lo devuelve la API. Nunca modificado."

      - name: api_ebay_price
        description: "Precio original de eBay en dólares tal como lo devuelve la API. Nunca modificado."

      - name: api_amazon_price
        description: "Precio original de Amazon en dólares tal como lo devuelve la API. Nunca modificado."

      - name: api_coolstuffinc_price
        description: "Precio original de CoolStuffInc en dólares tal como lo devuelve la API. Nunca modificado."

      - name: cardmarket_price
        description: "Precio efectivo de Cardmarket para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: tcgplayer_price
        description: "Precio efectivo de TCGPlayer para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: ebay_price
        description: "Precio efectivo de eBay para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: amazon_price
        description: "Precio efectivo de Amazon para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: coolstuffinc_price
        description: "Precio efectivo de CoolStuffInc para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: ban_tcg
        description: "Estado en el ban list del TCG: Forbidden, Limited o Semi-Limited. Null si no tiene restricción."
        tests:
          - accepted_values:
              arguments:
                values: ['Forbidden', 'Limited', 'Semi-Limited']
              config:
                where: "ban_tcg IS NOT NULL"

      - name: ban_ocg
        description: "Estado en el ban list del OCG: Forbidden, Limited o Semi-Limited. Null si no tiene restricción."
        tests:
          - accepted_values:
              arguments:
                values: ['Forbidden', 'Limited', 'Semi-Limited']
              config:
                where: "ban_ocg IS NOT NULL"

      - name: ban_goat
        description: "Estado en el ban list del formato GOAT. Null si no tiene restricción."

      - name: api_views
        description: "Total de vistas acumuladas original de la API. Nunca modificado."

      - name: api_viewsweek
        description: "Vistas semanales original de la API. Nunca modificado."

      - name: views
        description: "Vistas acumuladas efectivas para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: viewsweek
        description: "Vistas semanales efectivas para este snapshot. Simulado con Brownian Motion si is_mocked es TRUE."

      - name: upvotes
        description: "Número de votos positivos en YGOPRODeck."

      - name: downvotes
        description: "Número de votos negativos en YGOPRODeck."

      - name: tcg_date
        description: "Fecha de lanzamiento original de la carta en el TCG."

      - name: ocg_date
        description: "Fecha de lanzamiento original de la carta en el OCG."

      - name: konami_id
        description: "ID interno de Konami para la carta. Diferente del passcode."

      - name: has_effect
        description: "Indica si la carta tiene efecto real: 1 tiene efecto, 0 no tiene efecto."
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
              config:
                where: "has_effect IS NOT NULL"

      - name: md_rarity
        description: "Rareza de la carta en el videojuego Master Duel."

      - name: treated_as
        description: "Nombre bajo el que se trata la carta en reglas."

      - name: flat_processed_ts
        description: "Timestamp UTC del momento en que dbt procesó el aplanado."
        tests:
          - not_null

  - name: bronze_flat_card_sets
    description: >
      Expansión del array card_sets del JSON RAW.
      Cada fila representa una combinación única de carta, set y rareza.
      Una misma carta puede aparecer en múltiples sets y con múltiples rarezas.
    config:
      tags: ['bronze', 'flat']
    columns:
      - name: ingesta_id
        description: "Identificador de la ingesta que originó este registro."
        tests:
          - not_null

      - name: ingesta_ts
        description: "Timestamp UTC de la ingesta."
        tests:
          - not_null

      - name: entorno
        description: "Entorno en el que se generó el registro: dev, pre o pro."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['dev', 'pre', 'pro']

      - name: es_mock
        description: "Indica si el payload RAW de origen es simulado."
        tests:
          - not_null

      - name: card_id
        description: "Passcode de la carta."
        tests:
          - not_null

      - name: card_name
        description: "Nombre de la carta."
        tests:
          - not_null

      - name: set_name
        description: "Nombre completo del set."
        tests:
          - not_null

      - name: set_code
        description: "Código del set más número de carta."
        tests:
          - not_null

      - name: set_rarity
        description: "Rareza de la carta en este set."
        tests:
          - not_null

      - name: set_rarity_code
        description: "Código abreviado de la rareza."

      - name: set_price
        description: "Precio de la carta en este set en dólares según TCGPlayer."

      - name: flat_processed_ts
        description: "Timestamp UTC del momento en que dbt procesó el aplanado."
        tests:
          - not_null

  - name: bronze_flat_card_images
    description: >
      Expansión del array card_images del JSON RAW.
      Cada fila representa una imagen o artwork alternativo de una carta.
      El artwork_index 0 corresponde al arte principal, los índices superiores a artes alternativos.
    config:
      tags: ['bronze', 'flat']
    columns:
      - name: ingesta_id
        description: "Identificador de la ingesta que originó este registro."
        tests:
          - not_null

      - name: ingesta_ts
        description: "Timestamp UTC de la ingesta."
        tests:
          - not_null

      - name: entorno
        description: "Entorno en el que se generó el registro: dev, pre o pro."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['dev', 'pre', 'pro']

      - name: es_mock
        description: "Indica si el payload RAW de origen es simulado."
        tests:
          - not_null

      - name: card_id
        description: "Passcode de la carta."
        tests:
          - not_null

      - name: card_name
        description: "Nombre de la carta."
        tests:
          - not_null

      - name: artwork_index
        description: "Índice del artwork: 0 es el arte principal, mayor que 0 es arte alternativo."
        tests:
          - not_null

      - name: image_id
        description: "ID de la imagen en el servidor de imágenes de YGOPRODeck."
        tests:
          - not_null

      - name: image_url
        description: "URL de la imagen en tamaño completo."
        tests:
          - not_null

      - name: image_url_small
        description: "URL de la imagen en tamaño reducido."
        tests:
          - not_null

      - name: image_url_cropped
        description: "URL de la imagen recortada mostrando solo el arte."
        tests:
          - not_null

      - name: flat_processed_ts
        description: "Timestamp UTC del momento en que dbt procesó el aplanado."
        tests:
          - not_null