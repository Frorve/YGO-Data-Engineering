version: 2

models:

  # ============================================================
  # TABLAS DE REFERENCIA (sin incrementalidad)
  # ============================================================

  - name: ref_entornos
    description: >
      Catálogo de entornos disponibles en el proyecto.
      Tabla de referencia estática con 3 valores fijos: dev, pre y pro.
      No tiene incrementalidad. Se reconstruye completa en cada ejecución.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: entorno_id
        description: "Identificador del entorno. Valores posibles: dev, pre, pro."
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['dev', 'pre', 'pro']

      - name: descripcion
        description: "Descripción legible del entorno."
        tests:
          - not_null
  
  - name: ref_card_types
    description: >
      Catálogo de tipos de carta disponibles en el universo Yu-Gi-Oh.
      Tabla de referencia estática con todos los tipos conocidos de la API de YGOPRODeck.
      No tiene incrementalidad. Se reconstruye completa en cada ejecución.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: card_type_id
        description: "Identificador del tipo de carta. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique

      - name: descripcion
        description: "Descripción legible del tipo de carta."
        tests:
          - not_null

      - name: categoria
        description: "Agrupación del tipo de carta. Valores posibles: Monster, Spell, Trap, Token, Skill."
        tests:
          - not_null
          - accepted_values:
              values: ['Monster', 'Spell', 'Trap', 'Token', 'Skill']

  - name: ref_frame_types
    description: >
      Catálogo de tipos de marco visual de las cartas de Yu-Gi-Oh.
      El frame_type determina el color y diseño del fondo de la carta.
      Tabla de referencia estática. No tiene incrementalidad.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: frame_type_id
        description: "Identificador del tipo de marco. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique

      - name: descripcion
        description: "Descripción legible del tipo de marco visual."
        tests:
          - not_null

  - name: ref_races
    description: >
      Catálogo de razas de monstruos y subtipos de Spell y Trap en Yu-Gi-Oh.
      Para monstruos indica el tipo de criatura. Para Spell y Trap indica el subtipo
      de la carta (Normal, Field, Equip, Counter, etc.).
      Tabla de referencia estática. No tiene incrementalidad.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: race_id
        description: "Identificador de la raza o subtipo. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique

      - name: descripcion
        description: "Descripción legible de la raza o subtipo."
        tests:
          - not_null

      - name: aplica_a
        description: "Indica a qué tipo de carta aplica esta raza. Valores posibles: Monster, Spell, Trap."
        tests:
          - not_null
          - accepted_values:
              values: ['Monster', 'Spell', 'Trap']

  - name: ref_attributes
    description: >
      Catálogo de atributos de los monstruos en Yu-Gi-Oh.
      El atributo determina la naturaleza elemental del monstruo.
      Solo aplica a cartas de tipo monstruo, las cartas Spell y Trap no tienen atributo.
      Tabla de referencia estática. No tiene incrementalidad.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: attribute_id
        description: "Identificador del atributo. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique

      - name: descripcion
        description: "Descripción legible del atributo."
        tests:
          - not_null

  - name: ref_md_rarities
    description: >
      Catálogo de rarezas disponibles en el videojuego Master Duel.
      Las rarezas de Master Duel son independientes de las rarezas del juego de cartas físico.
      Tabla de referencia estática. No tiene incrementalidad.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: md_rarity_id
        description: "Identificador de la rareza en Master Duel. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique

      - name: descripcion
        description: "Descripción legible de la rareza."
        tests:
          - not_null

      - name: orden
        description: "Orden de mayor a menor rareza. 1 es la rareza más alta."
        tests:
          - not_null

  - name: ref_ban_status
    description: >
      Catálogo de estados posibles en el ban list de Yu-Gi-Oh.
      Aplica a los tres formatos principales: TCG, OCG y GOAT.
      El estado determina cuántas copias de una carta se pueden incluir en el mazo.
      Tabla de referencia estática. No tiene incrementalidad.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: ban_status_id
        description: "Identificador del estado de ban. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['Forbidden', 'Limited', 'Semi-Limited', 'Unlimited']

      - name: descripcion
        description: "Descripción legible del estado de ban."
        tests:
          - not_null

      - name: copias_permitidas
        description: "Número máximo de copias permitidas en el mazo. 0 para Forbidden, 1 para Limited, 2 para Semi-Limited, 3 para Unlimited."
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3]

  - name: ref_archetypes
    description: >
      Catálogo de arquetipos existentes en Yu-Gi-Oh extraídos de los datos de la API.
      A diferencia del resto de tablas de referencia, esta tabla no tiene valores fijos
      predefinidos sino que se construye a partir de los arquetipos presentes en bronze_flat_cards.
      Konami añade nuevos arquetipos constantemente por lo que esta tabla crece con el tiempo
      pero no tiene incrementalidad, se reconstruye completa en cada ejecución.
    config:
      tags: ['silver', 'ref']
    columns:
      - name: archetype_id
        description: "Nombre del arquetipo. Coincide con el valor exacto devuelto por la API."
        tests:
          - not_null
          - unique

      - name: descripcion
        description: "Descripción del arquetipo. Igual al archetype_id ya que la API no provee descripción adicional."
        tests:
          - not_null