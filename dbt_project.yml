
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'ygo_data_engineering'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'ygo_data_engineering'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In dbt, the default materialization for a model is a view. This means, when you run 
# dbt run or dbt build, all of your models will be built as a view in your data platform. 
# The configuration below will override this setting for models in the example folder to 
# instead be materialized as tables. Any models you add to the root of the models folder will 
# continue to be built as views. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.

models:
  ygo_data_engineering:
    bronze:
      raw:
        +materialized: table
        +schema: bronze
        +tags: ["bronze", "raw"]
        +description: "Capa RAW: almacena el JSON tal cual llega de la API de YGOPRODeck."
      flat:
        +materialized: incremental
        +unique_key: "ingesta_id"
        +on_schema_change: "sync_all_columns"
        +schema: bronze
        +tags: ["bronze", "flat"]
        +description: "Capa FLAT: aplanado del JSON RAW con simulación Brownian Motion para DEV."

    silver:
      +materialized: incremental
      +schema: silver
      +tags: ["silver"]

    gold:
      +materialized: table
      +schema: gold
      +tags: ["gold"]

# Variables globales por entorno

vars:
  # Entorno activo: dev | pre | pro  (se sobreescribe con --vars en CLI)
  env: "dev"

  # Mock Brownian Motion activado únicamente en DEV
  enable_brownian_mock: "{{ true if var('env') == 'dev' else false }}"

  # Volatilidades por plataforma (usadas en macros de simulación)
  brownian_volatility_cardmarket:  0.03
  brownian_volatility_ebay:        0.08
  brownian_volatility_tcgplayer:   0.05
  brownian_volatility_amazon:      0.06
  brownian_volatility_coolstuff:   0.04

  # Límites de protección anti-colapso (% del precio original de la API)
  brownian_floor_pct:    0.30
  brownian_ceiling_pct:  4.00

  # Volatilidad de views
  brownian_views_min_delta:  50
  brownian_views_max_delta:  550
  brownian_viewsweek_min:   -0.10
  brownian_viewsweek_max:    0.20

seeds:
  ygo_data_engineering:
    seed_raw_cards_dev:
      +schema: bronze
      +column_types:
        ingesta_id: varchar
        entorno: varchar
        endpoint_url: varchar
        http_status_code: integer
        raw_payload: varchar
        ingesta_ts: timestamp_ntz
        es_mock: boolean